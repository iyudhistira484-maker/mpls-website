<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - MPLS SMAN 5 TUBAN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            padding: 2rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.6s ease-out;
        }

        body.dark-mode .auth-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--gray-600);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 0.75rem;
            font-size: 1rem;
            background: var(--light);
            color: var(--gray-900);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-control.error {
            border-color: var(--danger);
        }

        .form-error {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .form-options a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .form-options a:hover {
            color: var(--secondary);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-600);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: var(--secondary);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--gray-400);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-300);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.875rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        .demo-credentials {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .demo-credentials strong {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Masuk</h1>
                <p>Selamat kembali ke MPLS SMAN 5 TUBAN</p>
            </div>

            <div class="demo-credentials">
                <strong>Demo Akun:</strong><br>
                Email: demo@example.com<br>
                Password: demo123
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Masukkan email Anda" required>
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password Anda" required>
                    <div class="form-error" id="passwordError"></div>
                </div>

                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#">Lupa password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="loginBtn">Masuk</button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebaseapp/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.0.0/firebase-storage-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');

        // Load saved email if exists
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMe.checked = true;
            }
            themeToggle.updateIcon();
        });

        // Form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const password = passwordInput.value;

            // Validation
            if (!FormValidator.validateEmail(email)) {
                toast.error('Email tidak valid');
                return;
            }

            if (!password) {
                toast.error('Password tidak boleh kosong');
                return;
            }

            try {
                loading.show();
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="loading-spinner"></span>Memproses...';

                // Login
                const user = await loginUser(email, password);

                // Get user data
                const userData = await getUserData(user.uid);

                // Check if verified
                if (!userData.isVerified) {
                    // Generate new OTP
                    const otp = await generateOTP();
                    await saveOTP(email, otp);
                    
                    toast.info('Silakan verifikasi email Anda terlebih dahulu');
                    
                    setTimeout(() => {
                        window.location.href = `verify.html?email=${encodeURIComponent(email)}`;
                    }, 2000);
                    return;
                }

                // Save email if remember me is checked
                if (rememberMe.checked) {
                    localStorage.setItem('savedEmail', email);
                } else {
                    localStorage.removeItem('savedEmail');
                }

                toast.success('Login berhasil!');

                // Redirect to appropriate dashboard
                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'dashboard-admin.html';
                    } else {
                        window.location.href = 'dashboard-siswa.html';
                    }
                }, 1500);

            } catch (error) {
                loading.hide();
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Masuk';

                let errorMessage = 'Terjadi kesalahan saat login';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Email tidak terdaftar';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Password salah';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Terlalu banyak percobaan login. Coba lagi nanti.';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                toast.error(errorMessage);
            }
        });
    </script>
</body>
</html>
